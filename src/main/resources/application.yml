server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: url-shortener
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/urlshortener}
    username: ${DATABASE_USERNAME:urlshortener}
    password: ${DATABASE_PASSWORD:urlshortener}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:200ms}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  health:
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  short-code:
    length: ${APP_SHORT_CODE_LENGTH:7}
    max-generation-attempts: ${APP_SHORT_CODE_MAX_ATTEMPTS:5}
  destination-url:
    max-length: ${APP_DESTINATION_URL_MAX_LENGTH:2048}
  cache:
    default-ttl-seconds: ${APP_CACHE_DEFAULT_TTL_SECONDS:3600}
    negative-ttl-seconds: ${APP_CACHE_NEGATIVE_TTL_SECONDS:30}
  analytics:
    publish-timeout-ms: ${APP_ANALYTICS_PUBLISH_TIMEOUT_MS:250}
  security:
    api-key: ${APP_API_KEY:dev-api-key-change-me}
    require-api-key: ${APP_SECURITY_REQUIRE_API_KEY:true}
    rate-limit:
      enabled: ${APP_RATE_LIMIT_ENABLED:true}
      requests-per-minute: ${APP_RATE_LIMIT_PER_MINUTE:60}
  bulk:
    max-batch-size: ${APP_BULK_MAX_BATCH_SIZE:20}
  agentic:
    enabled: ${APP_AGENTIC_ENABLED:true}
    block-high-risk: ${APP_AGENTIC_BLOCK_HIGH_RISK:true}
